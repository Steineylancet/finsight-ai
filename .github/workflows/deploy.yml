name: FinSight AI — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          AZURE_OPENAI_ENDPOINT: https://dummy.openai.azure.com/
          AZURE_OPENAI_API_KEY: dummy-key
          AZURE_OPENAI_API_VERSION: 2024-02-01
          AZURE_OPENAI_CHAT_DEPLOYMENT: gpt-4o
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: text-embedding-ada-002
          AZURE_SEARCH_ENDPOINT: https://dummy.search.windows.net
          AZURE_SEARCH_API_KEY: dummy-key
          AZURE_SEARCH_INDEX_NAME: finsight-index
          AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;dummy
          AZURE_STORAGE_CONTAINER_NAME: financial-data

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies into package folder
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Zip app for deployment
        run: zip -r app.zip . -x "*.git*" -x "data/*" -x "gl_data/*" -x "master_data/*" -x "planning_data/*" -x "__pycache__/*"

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App via ZIP
        run: |
          az webapp deployment source config-zip \
            --name finsight-ai-app \
            --resource-group finsight-ai-rg \
            --src app.zip

      - name: Set Azure App Settings
        run: |
          az webapp config appsettings set \
            --name finsight-ai-app \
            --resource-group finsight-ai-rg \
            --settings \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
              AZURE_OPENAI_API_VERSION="2024-02-01" \
              AZURE_OPENAI_CHAT_DEPLOYMENT="gpt-4o" \
              AZURE_OPENAI_EMBEDDING_DEPLOYMENT="text-embedding-ada-002" \
              AZURE_SEARCH_ENDPOINT="${{ secrets.AZURE_SEARCH_ENDPOINT }}" \
              AZURE_SEARCH_API_KEY="${{ secrets.AZURE_SEARCH_API_KEY }}" \
              AZURE_SEARCH_INDEX_NAME="finsight-index" \
              AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              AZURE_STORAGE_CONTAINER_NAME="financial-data"
